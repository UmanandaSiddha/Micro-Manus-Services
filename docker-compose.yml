# Production compose (VPS). Postgres and Redis run as SEPARATE containers on the
# external `shared-network` — this stack is the backend only. Locally you don't
# need this file at all: the app uses the host Postgres + local Redis directly
# (see .env.example / docs/deployment.md).
#
# One-time on the VPS:  docker network create shared-network
services:
  backend:
    build: .
    container_name: micromanus-backend
    restart: unless-stopped
    # All env (DATABASE_URL, REDIS_URL, JWT_SECRET, FIREBASE_*, STRIPE_*,
    # TAVILY/VOYAGE keys, CORS_ORIGINS, ...) is read from .env on the VPS —
    # never committed. See .env.production.example for the full list.
    env_file:
      - .env
    ports:
      - "4000:4000"
    volumes:
      - artifacts:/app/data/artifacts
    networks:
      - shared-network

volumes:
  artifacts:

networks:
  shared-network:
    external: true
