services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: mm
      POSTGRES_PASSWORD: mm
      POSTGRES_DB: micromanus
    ports:
      - "55432:5432" # host has local postgres instances on 5432 AND 5433
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "56379:6379" # host 6379 is held by another project's redis-stack

volumes:
  pgdata:
